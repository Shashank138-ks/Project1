<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adisha Scoop - Premium Ice Cream</title>
    <link rel="stylesheet" href="/static/store.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="store-header">
        <div class="logo">🍦 ADISHA SCOOP</div>
        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">Our Story</a>
            <a href="/management">Admin Panel</a>
        </nav>
        <button class="cart-btn" onclick="toggleCart()">
            🛒 View Cart (<span id="cart-count">0</span>)
        </button>
    </header>

    <main class="store-main">
        <div class="hero-section">
            <h1>Artisanal Premium Ice Creams</h1>
            <p>Crafted with the finest ingredients from around the world.</p>
        </div>

        <div class="product-grid" id="product-grid">
            <!-- Products will be dynamically injected here -->
        </div>
    </main>

    <!-- Shopping Cart Modal -->
    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-modal" id="cart-modal">
        <div class="cart-content">
            <button class="close-cart" onclick="toggleCart()">×</button>
            <h2>Your Cart</h2>
            <div id="cart-items" class="cart-items">
                <!-- Cart items injected here -->
            </div>
            <div class="cart-summary">
                <div class="summary-row"><span>Subtotal:</span> <span id="cart-subtotal">$0.00</span></div>
                <div class="summary-row"><span>Savings:</span> <span id="cart-discount" class="discount-text">-$0.00</span></div>
                <div class="summary-row total"><span>Total:</span> <span id="cart-total">$0.00</span></div>
                <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <script src="/static/store.js"></script>
</body>
</html>
